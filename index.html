<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CALL — 웨이터</title>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CALL">
<meta name="theme-color" content="#1a2535">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">

import { getDatabase, ref, push, onValue, remove, set, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  apiKey:"AIzaSyDpToFo3_0q35eRxpZ6iIWC5nUZqZKGZqw",
  authDomain:"nightcall-47430.firebaseapp.com",
  databaseURL:"https://nightcall-47430-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"nightcall-47430",
  storageBucket:"nightcall-47430.firebasestorage.app",
  messagingSenderId:"522787869614",

window._onValue=onValue; window._remove=remove; window._set=set; window._get=get; window._update=update;
window._fbReady=true;
document.dispatchEvent(new Event('fb-ready'));
</script>

<style>
:root{
  --bg:#eef2f7;--bg2:#e4eaf2;--card:#fff;
  --navy:#1a2535;--blue:#3a5a8a;--muted:#7a8fa8;
  --border:rgba(26,37,53,0.1);--text:#1a2535;
  --red:#c0392b;--green:#27ae60;--orange:#e67e22;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;}

.btn{width:100%;padding:0.9rem;border-radius:10px;border:none;font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-ghost{background:var(--bg2);color:var(--muted);margin-top:0.5rem;}
.btn-danger{background:#fbeaea;color:var(--red);margin-top:0.4rem;}

.inp{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:0.8rem 1rem;font-family:inherit;font-size:0.9rem;color:var(--navy);outline:none;transition:border-color 0.2s;margin-bottom:0.6rem;}
.inp:focus{border-color:var(--navy);}
.inp::placeholder{color:var(--muted);}
.inp-label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.35rem;font-weight:500;display:block;}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0;}
.pad{padding:1rem 1.25rem;}

/* 로그인 */
#loginScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.logo{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--navy);line-height:1;font-variant-emoji:text;}
.login-logo{font-family:'DM Serif Display',serif;font-size:3rem;color:var(--navy);margin-bottom:0.2rem;font-variant-emoji:text;}.login-sub{font-size:0.68rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:2.5rem;}
.login-box{width:100%;max-width:340px;background:var(--card);border-radius:16px;padding:1.5rem;border:0.5px solid var(--border);}
.auth-tabs{display:flex;gap:0.4rem;margin-bottom:1.25rem;}
.auth-tab{flex:1;padding:0.6rem;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:0.8rem;font-weight:600;transition:all 0.15s;}
.auth-tab.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.divider{height:0.5px;background:var(--border);margin:1rem 0;}
.err{font-size:0.75rem;color:var(--red);margin-bottom:0.6rem;display:none;}
.err.show{display:block;}
.wpick{display:flex;align-items:center;gap:0.75rem;padding:0.8rem 0.9rem;border-radius:10px;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all 0.15s;margin-bottom:0.4rem;}
.wpick.selected{background:var(--navy);border-color:var(--navy);}
.wpick-emoji{font-size:1.2rem;flex-shrink:0;}
.wpick-info{flex:1;}
.wpick-name{font-size:0.88rem;font-weight:600;color:var(--navy);}
.wpick-zone{font-size:0.68rem;color:var(--muted);margin-top:0.1rem;}
.wpick.selected .wpick-name{color:#fff;}
.wpick.selected .wpick-zone{color:rgba(255,255,255,0.5);}
.wpick-check{color:var(--muted);font-size:0.9rem;opacity:0;}
.wpick.selected .wpick-check{opacity:1;color:#fff;}

/* 헤더 */
#dashScreen{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.hdr{padding:1rem 1.25rem 0.9rem;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.logo{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--navy);line-height:1;}
.hdr-name{font-size:0.68rem;color:var(--muted);margin-top:0.15rem;}
.hdr-right{display:flex;align-items:center;gap:0.6rem;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite;}
.logout-btn{background:var(--bg2);border:none;border-radius:6px;padding:0.4rem 0.75rem;font-size:0.7rem;color:var(--muted);cursor:pointer;font-family:inherit;font-weight:500;}

/* 탭 */
.tabs{display:flex;gap:0.4rem;padding:0.75rem 1.25rem 0;flex-shrink:0;}
.tab{flex:1;padding:0.6rem;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:0.72rem;font-weight:600;transition:all 0.15s;}
.tab.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.badge{display:inline-block;background:var(--red);color:#fff;font-size:0.58rem;font-weight:700;border-radius:8px;padding:0.05rem 0.35rem;margin-left:0.2rem;vertical-align:middle;}

/* 알림 카드 */
.notif-card{background:var(--card);border-radius:12px;padding:0.95rem 1.1rem;display:flex;align-items:flex-start;gap:0.85rem;margin-bottom:0.6rem;border:0.5px solid var(--border);animation:slideIn 0.2s ease both;}
.notif-card.type-call{border-left:3px solid var(--navy);}
.notif-card.type-booking{border-left:3px solid var(--red);}
.notif-ico{font-size:1.4rem;flex-shrink:0;margin-top:0.1rem;}
.notif-body{flex:1;}
.notif-tag{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.15em;font-weight:600;margin-bottom:0.25rem;}
.type-call .notif-tag{color:var(--blue);}
.type-booking .notif-tag{color:var(--red);}
.notif-msg{font-size:0.95rem;font-weight:600;color:var(--navy);line-height:1.3;}
.notif-table{font-size:0.75rem;color:var(--muted);margin-top:0.2rem;font-weight:500;}
.notif-time{font-size:0.65rem;color:var(--muted);margin-top:0.2rem;}
.done-btn{background:var(--bg2);border:none;border-radius:6px;padding:0.4rem 0.65rem;font-size:0.72rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:all 0.15s;flex-shrink:0;}
.done-btn:hover{background:#d4edda;color:var(--green);}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:0.85rem;}
.empty-icon{font-size:2rem;margin-bottom:0.5rem;}

/* 손님 카드 */
.guest-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:0.75rem;}
.guest-card-top{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;}
.guest-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.guest-label{flex:1;font-size:0.95rem;font-weight:600;color:var(--navy);}
.guest-booking-count{background:#fbeaea;border-radius:6px;padding:0.25rem 0.6rem;font-size:0.75rem;font-weight:700;color:var(--red);}
.guest-card-btns{display:flex;gap:0.5rem;}
.guest-qr-btn{flex:1;padding:0.55rem;border-radius:8px;border:0.5px solid var(--border);background:var(--bg);font-family:inherit;font-size:0.75rem;font-weight:600;color:var(--navy);cursor:pointer;transition:all 0.15s;text-align:center;}
.guest-qr-btn:active{transform:scale(0.97);}
.guest-checkout-btn{flex:1;padding:0.55rem;border-radius:8px;border:none;background:#fbeaea;font-family:inherit;font-size:0.75rem;font-weight:600;color:var(--red);cursor:pointer;transition:all 0.15s;text-align:center;}
.guest-checkout-btn:active{transform:scale(0.97);}

/* QR 팝업 */
.qr-popup{display:none;position:fixed;inset:0;background:rgba(26,37,53,0.6);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
.qr-popup.open{display:flex;}
.qr-sheet{background:var(--card);border-radius:16px;padding:1.75rem;width:calc(100% - 3rem);max-width:320px;text-align:center;}
.qr-sheet-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--navy);margin-bottom:0.3rem;}
.qr-sheet-sub{font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem;}
.qr-img-box{width:180px;height:180px;margin:0 auto 1.25rem;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.qr-img-box canvas,.qr-img-box img{width:180px!important;height:180px!important;}
.qr-url-text{font-size:0.68rem;color:var(--muted);word-break:break-all;margin-bottom:1.25rem;line-height:1.4;}
.qr-close{width:100%;padding:0.85rem;border-radius:10px;border:none;background:var(--navy);color:#fff;font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,37,53,0.5);backdrop-filter:blur(4px);z-index:300;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:1.75rem 1.5rem 2.5rem;width:100%;max-width:480px;animation:slideUp 0.25s ease;}
.modal-handle{width:36px;height:4px;background:var(--bg2);border-radius:2px;margin:0 auto 1.5rem;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--navy);margin-bottom:1.25rem;}

/* 내역 */
.hist-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:0.85rem 1rem;display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;opacity:0.65;}
.hist-ico{font-size:1rem;flex-shrink:0;}
.hist-body{flex:1;}
.hist-msg{font-size:0.85rem;font-weight:600;color:var(--navy);}
.hist-table{font-size:0.72rem;color:var(--muted);margin-top:0.1rem;}
.hist-time{font-size:0.65rem;color:var(--muted);margin-top:0.1rem;}
.hist-tag{font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:4px;font-weight:600;flex-shrink:0;}
.hist-tag.call{background:#e8eef8;color:var(--blue);}
.hist-tag.booking{background:#fbeaea;color:var(--red);}
.notif-card.type-beer{border-left:3px solid #e67e22;}
.type-beer .notif-tag{color:#e67e22;}
.notif-card.type-message{border-left:3px solid #8e44ad;}
.type-message .notif-tag{color:#8e44ad;}
.hist-tag.beer{background:#fef3e8;color:#e67e22;}
.hist-tag.message{background:#f3e8fe;color:#8e44ad;}
.reply-textarea{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:0.8rem 1rem;font-family:inherit;font-size:0.88rem;color:var(--navy);outline:none;resize:none;height:100px;margin-bottom:1rem;transition:border-color 0.2s;}
.reply-textarea:focus{border-color:var(--navy);}
.reply-textarea::placeholder{color:var(--muted);}

#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;border-radius:8px;padding:0.7rem 1.25rem;font-size:0.82rem;white-space:nowrap;z-index:400;opacity:0;pointer-events:none;transition:opacity 0.25s;}
#toast.show{opacity:1;}

/* 인앱 알림 배너 */
#inAppBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:500;padding:0.6rem 1rem;animation:slideDown 0.3s ease;overflow:hidden;}
#inAppBanner.show{display:flex;align-items:center;gap:0.75rem;}
.iab-call{background:#1a2535;}
.iab-booking{background:var(--red);}
.iab-beer{background:#e67e22;}
.iab-message{background:#8e44ad;}
.iab-icon{font-size:1.4rem;flex-shrink:0;}
.iab-body{flex:1;}
.iab-title{font-size:0.82rem;font-weight:700;color:#fff;margin-bottom:0.1rem;}
.iab-sub{font-size:0.72rem;color:rgba(255,255,255,0.7);}
.iab-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.2rem;cursor:pointer;padding:0.2rem;flex-shrink:0;}
@keyframes slideDown{from{transform:translateY(-100%);}to{transform:translateY(0);}}

/* 설치 배너 */
#installBanner{display:none;position:fixed;bottom:1.5rem;left:1.25rem;right:1.25rem;background:var(--navy);border-radius:12px;padding:0.85rem 1rem;align-items:center;gap:0.75rem;z-index:300;}
.install-text{flex:1;}
.install-title{font-size:0.75rem;font-weight:600;color:#fff;}
.install-sub{font-size:0.65rem;color:rgba(255,255,255,0.5);margin-top:0.1rem;}
.install-btn{background:#d4a843;border:none;border-radius:8px;padding:0.5rem 1rem;font-size:0.78rem;font-weight:700;color:var(--navy);cursor:pointer;font-family:inherit;white-space:nowrap;}
.install-close{background:none;border:none;color:rgba(255,255,255,0.4);font-size:1.1rem;cursor:pointer;padding:0.2rem;}

@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.35s ease both;}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen">
  <div class="login-logo fade-up">C&#xFE0E;all</div>
  <div class="login-sub fade-up" style="animation-delay:0.05s;">웨이터 전용</div>
  <div class="login-box fade-up" style="animation-delay:0.1s;">
    <div class="auth-tabs">
      <button class="auth-tab active" id="atab-login" onclick="switchAuthTab('login')">로그인</button>
      <button class="auth-tab" id="atab-reg" onclick="switchAuthTab('reg')">처음 등록</button>
    </div>
    <div id="loginForm">
      <label class="inp-label">업장명 + 웨이터 이름</label>
      <input class="inp" id="loginName" type="text" placeholder="예: 국빈관홍길동">
      <label class="inp-label">비밀번호</label>
      <input class="inp" id="loginPass" type="password" placeholder="••••">
      <div class="err" id="loginErr">이름 또는 비밀번호가 틀렸어요</div>
      <button class="btn btn-primary" onclick="doLogin()">로그인</button>
    </div>
    <div id="regForm" style="display:none;">
      <label class="inp-label">업장명 + 웨이터 이름</label>
      <input class="inp" id="regName" type="text" placeholder="예: 국빈관홍길동">
      <div style="font-size:0.72rem;color:var(--muted);margin-top:-0.3rem;margin-bottom:0.6rem;">업장명과 본인 이름을 붙여서 입력해주세요</div>
      <label class="inp-label">비밀번호 설정</label>
      <input class="inp" id="regPass" type="password" placeholder="4자리 이상">
      <label class="inp-label">비밀번호 확인</label>
      <input class="inp" id="regPass2" type="password" placeholder="다시 입력">
      <div class="err" id="regErr">오류</div>
      <button class="btn btn-primary" onclick="doRegister()">등록하기</button>
    </div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashScreen">
  <div class="hdr">
    <div>
      <div class="logo">C&#xFE0E;all</div>
      <div class="hdr-name" id="dashName">웨이터</div>
    </div>
    <div class="hdr-right">
      <div class="live-dot"></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-notif" onclick="switchTab('notif')">알림 <span id="notifBadge" style="display:none;" class="badge">0</span></button>
    <button class="tab" id="tab-guests" onclick="switchTab('guests')">내 손님</button>
    <button class="tab" id="tab-hist" onclick="switchTab('hist')">내역</button>
  </div>

  <!-- 알림 -->
  <div id="panel-notif" class="scroll"><div class="pad">
    <button class="btn btn-danger" style="margin-bottom:1rem;" id="clearNotifsBtn" onclick="clearAllNotifs()" style="display:none;">✓ 알림 전체 확인</button>
    <div id="notifFeed"><div class="empty"><div class="empty-icon">🔕</div>호출 없음</div></div>
  </div></div>

  <!-- 내 손님 -->
  <div id="panel-guests" class="scroll" style="display:none;"><div class="pad">
    <button class="btn btn-primary" style="margin-bottom:1rem;" onclick="openAddGuest()">+ 손님 추가</button>
    <div id="guestList"><div class="empty" style="padding:1.5rem;font-size:0.82rem;">등록된 손님 없음<br><span style="font-size:0.75rem;color:var(--muted);">위 버튼으로 추가하세요</span></div></div>
  </div></div>

  <!-- 내역 -->
  <div id="panel-hist" class="scroll" style="display:none;"><div class="pad">
    <button class="btn btn-danger" style="margin-bottom:1rem;" onclick="clearHistory()">🗑 내역 전체 삭제</button>
    <div id="histList"><div class="empty"><div style="font-size:1.5rem;margin-bottom:0.5rem;">—</div><div style="font-size:0.82rem;">처리된 내역이 쌓여요</div></div></div>
  </div></div>
</div>

<!-- 직접 답장 모달 -->
<div class="modal-bg" id="replyInputModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">직접 답장</div>
    <textarea class="reply-textarea" id="replyInputText" placeholder="손님에게 보낼 메시지를 입력해요..."></textarea>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn btn-ghost" onclick="closeModal('replyInputModal')" style="margin-top:0;">취소</button>
      <button class="btn btn-primary" onclick="sendReplyInput()" style="margin-top:0;">전송</button>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="modal-bg" id="changePwModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">비밀번호 변경</div>
    <label class="inp-label">현재 비밀번호</label>
    <input class="inp" id="curPw" type="password" placeholder="현재 비밀번호">
    <label class="inp-label">새 비밀번호</label>
    <input class="inp" id="newPw" type="password" placeholder="새 비밀번호 (4자리 이상)">
    <label class="inp-label">새 비밀번호 확인</label>
    <input class="inp" id="newPw2" type="password" placeholder="다시 입력">
    <div class="err" id="pwErr">오류</div>
    <button class="btn btn-primary" onclick="doChangePw()">변경하기</button>
    <button class="btn btn-ghost" onclick="closeModal('changePwModal')">취소</button>
  </div>
</div>

<!-- 손님 추가 모달 -->
<div class="modal-bg" id="addGuestModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">손님 추가</div>
    <label class="inp-label">테이블/룸 정보</label>
    <input class="inp" id="addGuestLabel" type="text" placeholder="예: 4번 룸 남성 2분">
    <button class="btn btn-primary" onclick="doAddGuest()">추가 + QR 생성</button>
    <button class="btn btn-ghost" onclick="closeModal('addGuestModal')">취소</button>
  </div>
</div>

<!-- QR 팝업 -->
<div class="qr-popup" id="qrPopup">
  <div class="qr-sheet">
    <div class="qr-sheet-title" id="qrPopupTitle">손님 QR</div>
    <div class="qr-sheet-sub" id="qrPopupSub">손님에게 스캔하게 해주세요</div>
    <div class="qr-img-box" id="qrPopupBox"></div>
    <div class="qr-url-text" id="qrPopupUrl"></div>
    <button class="qr-close" onclick="closeQR()">닫기</button>
  </div>
</div>

<!-- 인앱 알림 배너 -->
<div id="inAppBanner">
  <div class="iab-icon" id="iabIcon"></div>
  <div class="iab-body">
    <div class="iab-title" id="iabTitle"></div>
    <div class="iab-sub" id="iabSub"></div>
  </div>
  <button class="iab-close" onclick="hideInAppBanner()">×</button>
</div>

<!-- 설치 배너 -->
<div id="installBanner">
  <div class="install-text">
    <div class="install-title">앱으로 설치하기</div>
    <div class="install-sub">홈 화면에 추가하면 더 편해요</div>
  </div>
  <button class="install-btn" onclick="installApp()">설치</button>
  <button class="install-close" onclick="document.getElementById('installBanner').style.display='none'">×</button>
</div>

<div id="toast"></div>

<script>
let W = null;
let db, fbRef, fbPush, fbOnValue, fbRemove, fbSet, fbGet, fbUpdate;
let prevNotifCount = -1;

function _assignFb() {
  db=window._db; fbRef=window._ref; fbPush=window._push;
  fbOnValue=window._onValue; fbRemove=window._remove;
  fbSet=window._set; fbGet=window._get; fbUpdate=window._update;
}
document.addEventListener('fb-ready', _assignFb);
function waitFb(fn) {
  if (window._fbReady) { _assignFb(); fn(); }
  else document.addEventListener('fb-ready', () => { _assignFb(); fn(); }, {once:true});
}
function nowStr() { const n=new Date(); return n.getHours()+':'+String(n.getMinutes()).padStart(2,'0'); }
function todayStr() { const n=new Date(); return n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+n.getDate()+'일'; }

// ── 인증 ──
function switchAuthTab(tab) {
  document.getElementById('atab-login').classList.toggle('active', tab==='login');
  document.getElementById('atab-reg').classList.toggle('active', tab==='reg');
  document.getElementById('loginForm').style.display = tab==='login' ? '' : 'none';
  document.getElementById('regForm').style.display = tab==='reg' ? '' : 'none';
}

function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  const err = document.getElementById('regErr');
  if (!name) { err.textContent='이름을 입력해주세요'; err.classList.add('show'); return; }
  if (pass.length < 4) { err.textContent='비밀번호는 4자리 이상이에요'; err.classList.add('show'); return; }
  if (pass !== pass2) { err.textContent='비밀번호가 일치하지 않아요'; err.classList.add('show'); return; }
  waitFb(() => {
    fbGet(fbRef(db, `waiters/${name}`)).then(snap => {
      if (snap.exists()) { err.textContent='이미 사용 중인 이름이에요'; err.classList.add('show'); return; }
      const wid = 'w_' + Date.now();
      fbSet(fbRef(db, `waiters/${name}`), {id:wid, name, pass}).then(() => {
        err.classList.remove('show');
        toast('✓ 등록 완료!');
        switchAuthTab('login');
        document.getElementById('loginName').value = name;
      });
    });
  });
}

function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  waitFb(() => {
    fbGet(fbRef(db, `waiters/${name}`)).then(snap => {
      if (!snap.exists() || snap.val().pass !== pass) { err.classList.add('show'); return; }
      err.classList.remove('show');
      W = snap.val();
      localStorage.setItem('ncall_waiter', JSON.stringify(W));
      enterDash();
    });
  });
}

function enterDash() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashScreen').style.display = 'flex';
  document.getElementById('dashName').textContent = W.name + ' 웨이터님';
  requestNotifPerm();
  startListeners();
}

function doLogout() {
  W = null; prevNotifCount = -1;
  listenersStarted = false;
  lastNotifKey = null;
  localStorage.removeItem('ncall_waiter');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashScreen').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

// 자동 로그인
function autoLogin() {
  const saved = localStorage.getItem('ncall_waiter');
  if (!saved) return;
  try {
    const data = JSON.parse(saved);
    if (!data || !data.id || !data.name) return;
    waitFb(() => {
      fbGet(fbRef(db, `waiters/${data.name}`)).then(snap => {
        if (!snap.exists() || snap.val().pass !== data.pass) {
          localStorage.removeItem('ncall_waiter');
          return;
        }
        W = snap.val();
        enterDash();
      });
    });
  } catch(e) { localStorage.removeItem('ncall_waiter'); }
}

// ── 탭 ──
function switchTab(tab) {
  ['notif','guests','hist'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('panel-'+t).style.display = t===tab ? '' : 'none';
  });
}

// ── 손님 추가 ──
function openAddGuest() {
  document.getElementById('addGuestLabel').value = '';
  document.getElementById('addGuestModal').classList.add('open');
  setTimeout(() => document.getElementById('addGuestLabel').focus(), 300);
}

function doAddGuest() {
  const label = document.getElementById('addGuestLabel').value.trim();
  if (!label) { toast('테이블 정보를 입력해주세요'); return; }
  closeModal('addGuestModal');
  waitFb(() => {
    const guestRef = fbPush(fbRef(db, `guests/${W.id}`), {
      label, bookingCount: 0, createdAt: nowStr(), active: true
    });
    const guestId = guestRef.key;
    toast('✓ 손님 추가됨');
    // 모달 닫힌 후 충분히 기다렸다가 QR 팝업
    setTimeout(() => showQR(guestId, label), 400);
  });
}

// ── QR 보여주기 ──
function showQR(guestId, label) {
  const url = location.origin + '/guest?w=' + encodeURIComponent(W.name) + '&g=' + guestId;
  document.getElementById('qrPopupTitle').textContent = '손님 호출 QR';
  document.getElementById('qrPopupSub').textContent = '손님에게 스캔하게 해주세요';
  document.getElementById('qrPopupUrl').textContent = url;
  document.getElementById('qrPopupBox').innerHTML = '';
  document.getElementById('qrPopup').classList.add('open');
  setTimeout(() => {
    document.getElementById('qrPopupBox').innerHTML = '';
    new QRCode(document.getElementById('qrPopupBox'), {
      text: url, width:180, height:180,
      colorDark:'#1a2535', colorLight:'#ffffff',
      correctLevel: QRCode.CorrectLevel.L
    });
  }, 100);
}

function closeQR() { document.getElementById('qrPopup').classList.remove('open'); }

// ── 계산 완료 ──
function checkoutGuest(guestId, label) {
  if (!confirm(label + '\n계산 완료 처리할까요?')) return;
  waitFb(() => {
    fbUpdate(fbRef(db, `guests/${W.id}/${guestId}`), {active: false});
    fbPush(fbRef(db, `history/${W.id}`), {
      type:'checkout', guestMsg: label, time: nowStr(), date: todayStr()
    });
  });
  toast('✓ 계산 완료');
}

// ── Firebase 리스너 ──
let lastNotifKey = null;
let listenersStarted = false;

function startListeners() {
  // waitFb 콜백 안에서 플래그 체크 — 타이밍 무관하게 딱 1번만 실행
  waitFb(() => {
    if (listenersStarted) return;
    listenersStarted = true;
    const wid = W.id;

  // 알림
  fbOnValue(fbRef(db, `notifs/${wid}`), snap => {
    const data = snap.val() || {};
    const notifs = Object.entries(data)
      .map(([k,v]) => ({...v, _key:k}))
      .filter(n => !n.done)
      .sort((a,b) => b._key.localeCompare(a._key));

    // 가장 최신 key 기준으로 새 알림인지 판단
    const latestKey = notifs.length > 0 ? notifs[0]._key : null;
    if (latestKey && latestKey !== lastNotifKey && prevNotifCount >= 0) {
      // lastNotifKey보다 큰 key만 새 알림으로 처리
      notifs.forEach(n => {
        if (!lastNotifKey || n._key > lastNotifKey) {
        notify(n.type, n.tableLabel, n.guestMsg, n.msgText || n.beerQty || '');
        }
      });
    }
    lastNotifKey = latestKey;
    prevNotifCount = notifs.length;

    const badge = document.getElementById('notifBadge');
    badge.style.display = notifs.length > 0 ? 'inline' : 'none';
    badge.textContent = notifs.length;

    const clearBtn = document.getElementById('clearNotifsBtn');
    clearBtn.style.display = notifs.length > 0 ? 'block' : 'none';

    const feed = document.getElementById('notifFeed');
    if (notifs.length === 0) {
      feed.innerHTML = '<div class="empty"><div class="empty-icon">🔕</div>호출 없음</div>';
    } else {
      feed.innerHTML = '';
      notifs.forEach(n => {
        const card = document.createElement('div');
        card.className = 'notif-card type-' + n.type;
        card.id = 'nc-' + n._key;
        const ico = document.createElement('div');
        ico.className = 'notif-ico';
        ico.textContent = n.type === 'call' ? '🙋' : n.type === 'beer' ? '🍾' : n.type === 'message' ? '💬' : '🔔';
        const body = document.createElement('div');
        body.className = 'notif-body';
        const tag = document.createElement('div');
        tag.className = 'notif-tag';
        tag.textContent = n.type === 'call' ? '웨이터 호출' : n.type === 'beer' ? '맥주 추가' : n.type === 'message' ? '메시지' : '부킹 요청';
        const msgEl = document.createElement('div');
        msgEl.className = 'notif-msg';
        msgEl.textContent = n.type === 'beer'
          ? (n.tableLabel || '손님') + ' — ' + (n.beerQty || 1) + '병'
          : n.type === 'message'
          ? (n.tableLabel || '손님')
          : (n.tableLabel || '손님');
        const timeEl = document.createElement('div');
        timeEl.className = 'notif-time';
        timeEl.textContent = n.time;
        const btns = document.createElement('div');
        btns.style.cssText = 'display:flex;gap:0.4rem;margin-top:0.5rem;';
        if (n.type !== 'beer') {
          if (n.type !== 'message') {
            const b1 = document.createElement('button');
            b1.textContent = '곧 갈게요';
            b1.style.cssText = 'background:#e8f0fe;border:none;border-radius:6px;padding:0.35rem 0.6rem;font-size:0.72rem;font-weight:600;color:#3a5a8a;cursor:pointer;font-family:inherit;';
            b1.onclick = () => replyGuest(n._key, n.guestId||'', wid, n.type, n.tableLabel||'손님', n.time, '곧 갈게요', n.msgText||'');
            const b2 = document.createElement('button');
            b2.textContent = '잠시만요';
            b2.style.cssText = 'background:#fef3e8;border:none;border-radius:6px;padding:0.35rem 0.6rem;font-size:0.72rem;font-weight:600;color:#e67e22;cursor:pointer;font-family:inherit;';
            b2.onclick = () => replyGuest(n._key, n.guestId||'', wid, n.type, n.tableLabel||'손님', n.time, '잠시만요', n.msgText||'');
            btns.append(b1, b2);
          } else {
            // 메시지 타입만 곧갈게요 잠시만요 + 답장
            const b1 = document.createElement('button');
            b1.textContent = '곧 갈게요';
            b1.style.cssText = 'background:#e8f0fe;border:none;border-radius:6px;padding:0.35rem 0.6rem;font-size:0.72rem;font-weight:600;color:#3a5a8a;cursor:pointer;font-family:inherit;';
            b1.onclick = () => replyGuest(n._key, n.guestId||'', wid, n.type, n.tableLabel||'손님', n.time, '곧 갈게요', n.msgText||'');
            const b2 = document.createElement('button');
            b2.textContent = '잠시만요';
            b2.style.cssText = 'background:#fef3e8;border:none;border-radius:6px;padding:0.35rem 0.6rem;font-size:0.72rem;font-weight:600;color:#e67e22;cursor:pointer;font-family:inherit;';
            b2.onclick = () => replyGuest(n._key, n.guestId||'', wid, n.type, n.tableLabel||'손님', n.time, '잠시만요', n.msgText||'');
            const b4 = document.createElement('button');
            b4.textContent = '✏️ 답장';
            b4.style.cssText = 'background:#e8f8ee;border:none;border-radius:6px;padding:0.35rem 0.6rem;font-size:0.72rem;font-weight:600;color:var(--green);cursor:pointer;font-family:inherit;';
            b4.onclick = () => openReplyInput(n._key, n.guestId||'', wid, n.type, n.tableLabel||'손님', n.time, n.msgText||'');
            btns.append(b1, b2, b4);
          }
        }
        const b3 = document.createElement('button');
        b3.textContent = '확인';
        b3.style.cssText = 'background:var(--bg2);border:none;border-radius:6px;padding:0.35rem 0.6rem;font-size:0.72rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;';
        b3.onclick = () => doneNotif(n._key, wid, n.type, n.tableLabel||'손님', n.time, n.beerQty||0, n.msgText||'');
        btns.append(b3);
        body.append(tag, msgEl);
        if (n.type === 'message') {
          const msgContent = document.createElement('div');
          msgContent.style.cssText = 'font-size:0.82rem;color:var(--navy);margin-top:0.3rem;background:var(--bg);border-radius:8px;padding:0.5rem 0.75rem;line-height:1.4;word-break:break-all;';
          msgContent.textContent = '"' + (n.msgText || '내용 없음') + '"';
          body.append(msgContent);
        }
        body.append(timeEl, btns);
        card.append(ico, body);
        feed.appendChild(card);
      });
    }
  });

  // 손님 목록
  fbOnValue(fbRef(db, `guests/${wid}`), snap => {
    const data = snap.val() || {};
    const guests = Object.entries(data)
      .map(([k,v]) => ({...v, _key:k}))
      .filter(g => g.active !== false);
    const list = document.getElementById('guestList');
    if (guests.length === 0) {
      list.innerHTML = '<div class="empty" style="padding:1.5rem;font-size:0.82rem;">등록된 손님 없음<br><span style="font-size:0.75rem;color:var(--muted);">위 버튼으로 추가하세요</span></div>';
    } else {
      list.innerHTML = guests.map(g => `
        <div class="guest-card" style="${g.muted ? 'opacity:0.6;' : ''}">
          <div class="guest-card-top">
            <div class="guest-dot" style="background:${g.muted ? 'var(--muted)' : 'var(--green)'}"></div>
            <div class="guest-label">${g.label}</div>
            <div class="guest-booking-count">부킹 ${g.bookingCount || 0}회</div>
          </div>
          <div class="guest-card-btns">
            <button class="guest-qr-btn" onclick="showQR('${g._key}','${g.label.replace(/'/g,"\\'")}')">📱 QR 보기</button>
            <button class="guest-qr-btn" onclick="toggleMute('${g._key}')" style="background:${g.muted ? '#e8f8ee' : '#fbeaea'};color:${g.muted ? 'var(--green)' : 'var(--red)'};">${g.muted ? '🔔 호출 허용' : '🔕 호출 차단'}</button>
            <button class="guest-checkout-btn" onclick="checkoutGuest('${g._key}','${g.label.replace(/'/g,"\\'")}')">✓ 계산 완료</button>
          </div>
        </div>
      `).join('');
    }
  });

  // 내역
  fbOnValue(fbRef(db, `history/${wid}`), snap => {
    const data = snap.val() || {};
    const hist = Object.entries(data)
      .map(([k,v]) => ({...v, _key:k}))
      .sort((a,b) => a._key.localeCompare(b._key)); // 시간순 오름차순
    const list = document.getElementById('histList');
    if (hist.length === 0) {
      list.innerHTML = '<div class="empty"><div style="font-size:1.5rem;margin-bottom:0.5rem;">—</div><div style="font-size:0.82rem;">처리된 내역이 쌓여요</div></div>';
      return;
    }

    // 날짜별 그룹핑
    const dateGroups = {};
    hist.forEach(n => {
      const date = n.date || '날짜 미상';
      if (!dateGroups[date]) dateGroups[date] = [];
      dateGroups[date].push(n);
    });

    const typeIcon  = { booking:'🔔', call:'🙋', checkout:'✓', beer:'🍾', message:'💬' };
    const typeLabel = { booking:'부킹', call:'호출', checkout:'계산', beer:'맥주', message:'메시지' };
    const typeColor = { booking:'var(--red)', call:'var(--blue)', checkout:'var(--green)', beer:'#e67e22', message:'#8e44ad' };

    // 날짜 내림차순 정렬
    const sortedDates = Object.keys(dateGroups).sort((a,b) => b.localeCompare(a));

    list.innerHTML = sortedDates.map(date => {
      const items = dateGroups[date];
      const isToday = date === todayStr();
      const dateFolderId = `date-${date.replace(/\s/g,'-')}`;

      // 날짜 안에서 테이블별 그룹핑
      const tableGroups = {};
      items.forEach(n => {
        const tbl = n.tableLabel || n.guestMsg || '손님';
        if (!tableGroups[tbl]) tableGroups[tbl] = [];
        tableGroups[tbl].push(n);
      });

      const tableFolders = Object.entries(tableGroups).map(([tbl, tItems]) => {
        const safeTbl = tbl.replace(/'/g,"\\'").replace(/\s/g,'-');
        const safeDate = date.replace(/\s/g,'-');
        const folderId = `tf-${safeDate}-${safeTbl}`;

        // 타입별 카운트
        const counts = { booking:0, call:0, checkout:0, beer:0, message:0 };
        tItems.forEach(n => { if(counts[n.type]!==undefined) counts[n.type]++; });

        const summaryHtml = Object.entries(counts).filter(([,c])=>c>0).map(([t,c])=>`
          <span style="display:inline-flex;align-items:center;gap:0.2rem;background:var(--bg2);border-radius:6px;padding:0.15rem 0.5rem;font-size:0.7rem;font-weight:600;color:${typeColor[t]};">
            ${typeIcon[t]} ${t==='checkout' ? '계산 완료' : typeLabel[t]+' '+c+'회'}
          </span>
        `).join('');

        const itemsHtml = tItems.map(n => `
          <div style="display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.75rem;border-bottom:0.5px solid var(--border);">
            <span style="font-size:1rem;">${typeIcon[n.type]||'•'}</span>
            <div style="flex:1;">
              <div style="font-size:0.8rem;font-weight:600;color:${typeColor[n.type]||'var(--navy)'};">${typeLabel[n.type]||n.type}${n.type==='beer'&&n.beerQty?' '+n.beerQty+'병':''}</div>
              ${n.type==='message'?`<div style="font-size:0.72rem;color:var(--muted);margin-top:0.15rem;">"${n.msgText||'내용 없음'}"</div>`:''}
              <div style="font-size:0.7rem;color:var(--muted);">${n.time}</div>
            </div>
            <button onclick="deleteHistItem('${n._key}')" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:0 0.2rem;">×</button>
          </div>
        `).join('');

        return `
          <div style="margin-bottom:0.6rem;background:var(--card);border-radius:12px;border:0.5px solid var(--border);overflow:hidden;">
            <div onclick="toggleFolder('${folderId}')" style="display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1rem;cursor:pointer;user-select:none;">
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;">
                  <span style="font-size:0.95rem;font-weight:700;color:var(--navy);">📁 ${tbl}</span>
                  <span style="background:var(--navy);color:#fff;font-size:0.62rem;font-weight:700;border-radius:10px;padding:0.1rem 0.4rem;">${tItems.length}건</span>
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:0.3rem;">${summaryHtml}</div>
              </div>
              <div style="display:flex;align-items:center;gap:0.5rem;margin-left:0.5rem;flex-shrink:0;">
                <button onclick="event.stopPropagation();deleteTableGroup('${wid}','${date}','${tbl}')" style="background:var(--bg2);border:none;color:var(--muted);font-size:0.7rem;font-weight:600;cursor:pointer;padding:0.25rem 0.5rem;border-radius:6px;">삭제</button>
                <span id="arrow-${folderId}" style="color:var(--muted);font-size:0.8rem;transition:transform 0.2s;">▼</span>
              </div>
            </div>
            <div id="${folderId}" style="display:none;border-top:0.5px solid var(--border);">
              ${itemsHtml}
            </div>
          </div>
        `;
      }).join('');

      // 총 건수
      const totalCount = items.length;

      return `
        <div style="margin-bottom:1rem;">
          <div onclick="toggleFolder('${dateFolderId}')" style="display:flex;align-items:center;justify-content:space-between;background:${isToday?'var(--navy)':'var(--bg2)'};border-radius:12px;padding:0.85rem 1rem;cursor:pointer;user-select:none;margin-bottom:0.5rem;">
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <span style="font-size:0.85rem;font-weight:700;color:${isToday?'#fff':'var(--muted)'};">📅 ${date}</span>
              <span style="background:${isToday?'rgba(255,255,255,0.2)':'var(--border)'};color:${isToday?'#fff':'var(--muted)'};font-size:0.62rem;font-weight:700;border-radius:10px;padding:0.1rem 0.4rem;">${totalCount}건</span>
              ${isToday?'<span style="font-size:0.65rem;color:rgba(255,255,255,0.7);">오늘</span>':''}
            </div>
            <span id="arrow-${dateFolderId}" style="color:${isToday?'#fff':'var(--muted)'};font-size:0.8rem;transition:transform 0.2s;${isToday?'transform:rotate(180deg);':''}">▼</span>
          </div>
          <div id="${dateFolderId}" style="display:${isToday?'block':'none'};">
            ${tableFolders}
          </div>
        </div>
      `;
    }).join('');
  });
  }); // waitFb 끝
}

function doneNotif(key, wid, type, tableLabel, time, beerQty, msgText) {
  waitFb(() => {
    // msgText가 없으면 Firebase에서 직접 읽어오기
    fbGet(fbRef(db, `notifs/${wid}/${key}`)).then(snap => {
      const notifData = snap.val() || {};
      const finalMsgText = msgText || notifData.msgText || '';
      fbRemove(fbRef(db, `notifs/${wid}/${key}`));
      const histData = {type, tableLabel, time, date:todayStr(), doneAt:nowStr()};
      if (type === 'beer' && beerQty) histData.beerQty = beerQty;
      if (type === 'message' && finalMsgText) histData.msgText = finalMsgText;
      fbPush(fbRef(db, `history/${wid}`), histData);
    });
  });
  toast('✓ 처리 완료');
}

function replyGuest(notifKey, guestId, wid, type, tableLabel, time, replyMsg, msgText) {
  waitFb(() => {
    fbGet(fbRef(db, `notifs/${wid}/${notifKey}`)).then(snap => {
      const notifData = snap.val() || {};
      const finalMsgText = msgText || notifData.msgText || '';
      fbRemove(fbRef(db, `notifs/${wid}/${notifKey}`));
      const histData = {type, tableLabel, time, date:todayStr(), doneAt:nowStr(), reply:replyMsg};
      if (type === 'message' && finalMsgText) histData.msgText = finalMsgText;
      fbPush(fbRef(db, `history/${wid}`), histData);
      if (guestId) fbSet(fbRef(db, `replies/${guestId}`), {msg: replyMsg, time: nowStr()});
    });
  });
  toast('✓ ' + replyMsg + ' 전송!');
}

function toggleMute(guestId) {
  waitFb(() => {
    fbGet(fbRef(db, `guests/${W.id}/${guestId}/muted`)).then(snap => {
      fbSet(fbRef(db, `guests/${W.id}/${guestId}/muted`), !snap.val());
    });
  });
}

function openChangePw() {
  document.getElementById('curPw').value = '';
  document.getElementById('newPw').value = '';
  document.getElementById('newPw2').value = '';
  document.getElementById('pwErr').classList.remove('show');
  document.getElementById('changePwModal').classList.add('open');
}

function doChangePw() {
  const cur = document.getElementById('curPw').value;
  const nw = document.getElementById('newPw').value;
  const nw2 = document.getElementById('newPw2').value;
  const err = document.getElementById('pwErr');
  if (cur !== W.pass) { err.textContent='현재 비밀번호가 틀렸어요'; err.classList.add('show'); return; }
  if (nw.length < 4) { err.textContent='4자리 이상 입력해주세요'; err.classList.add('show'); return; }
  if (nw !== nw2) { err.textContent='비밀번호가 일치하지 않아요'; err.classList.add('show'); return; }
  waitFb(() => {
    fbSet(fbRef(db, `waiters/${W.name}/pass`), nw).then(() => {
      W.pass = nw;
      closeModal('changePwModal');
      toast('✓ 비밀번호 변경 완료');
    });
  });
}

function clearAllNotifs() {
  if (!confirm('알림을 전체 확인 처리할까요?')) return;
  waitFb(() => {
    fbGet(fbRef(db, `notifs/${W.id}`)).then(snap => {
      const data = snap.val() || {};
      Object.entries(data).forEach(([k,v]) => {
        if (!v.done) {
          fbRemove(fbRef(db, `notifs/${W.id}/${k}`));
          const histItem = { type: v.type, tableLabel: v.tableLabel, time: v.time, date: todayStr(), doneAt: nowStr() };
          if (v.type === 'message' && v.msgText) histItem.msgText = v.msgText;
          if (v.type === 'beer' && v.beerQty) histItem.beerQty = v.beerQty;
          fbPush(fbRef(db, `history/${W.id}`), histItem);
        }
      });
    });
  });
  toast('✓ 알림 전체 확인');
}

function clearHistory() {
  if (!confirm('내역을 전체 삭제할까요?')) return;
  waitFb(() => fbRemove(fbRef(db, `history/${W.id}`)));
  toast('✓ 내역 삭제됨');
}

let pendingReply = null;

function openReplyInput(notifKey, guestId, wid, type, tableLabel, time, msgText) {
  pendingReply = { notifKey, guestId, wid, type, tableLabel, time, msgText };
  document.getElementById('replyInputText').value = '';
  document.getElementById('replyInputModal').classList.add('open');
  setTimeout(() => document.getElementById('replyInputText').focus(), 300);
}

function sendReplyInput() {
  const text = document.getElementById('replyInputText').value.trim();
  if (!text) { toast('메시지를 입력해주세요'); return; }
  if (!pendingReply) return;
  const { notifKey, guestId, wid, type, tableLabel, time, msgText } = pendingReply;
  closeModal('replyInputModal');
  replyGuest(notifKey, guestId, wid, type, tableLabel, time, text, msgText||'');
  pendingReply = null;
}

function toggleFolder(id) {
  const el = document.getElementById(id);
  const arrow = document.getElementById('arrow-' + id);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function deleteTableGroup(wid, date, tableLabel) {
  if (!confirm(date + '\n[' + tableLabel + '] 폴더 전체를 삭제할까요?')) return;
  waitFb(() => {
    fbGet(fbRef(db, `history/${wid}`)).then(snap => {
      const data = snap.val() || {};
      Object.entries(data).forEach(([k, v]) => {
        const tbl = v.tableLabel || v.guestMsg || '손님';
        if ((v.date || '날짜 미상') === date && tbl === tableLabel) {
          fbRemove(fbRef(db, `history/${wid}/${k}`));
        }
      });
    });
  });
  toast('✓ 삭제됨');
}

function deleteHistItem(key) {
  waitFb(() => fbRemove(fbRef(db, `history/${W.id}/${key}`)));
  toast('✓ 삭제됨');
}

// ── 알림/진동/소리 ──
// 앱 모드 감지
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}

async function requestNotifPerm() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    const result = await Notification.requestPermission();
    if (result === 'granted') toast('✓ 알림 허용됨');
  }
  if (Notification.permission === 'denied') {
    toast('⚠️ 알림이 차단돼 있어요. 브라우저 설정에서 허용해주세요.');
  }
}

// 이모지를 PNG dataURL로 변환
function emojiToPng(emoji) {
  try {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.font = '96px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, 64, 68);
    return canvas.toDataURL('image/png');
  } catch(e) { return '/icon-192.png'; }
}

async function showPush(type, msg, tableLabel) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') {
    const result = await Notification.requestPermission();
    if (result !== 'granted') return;
  }
  const title = type === 'call' ? '🙋 웨이터 호출' : type === 'beer' ? '🍾 맥주 추가' : type === 'message' ? '💬 메시지' : '🔔 부킹 요청';
  const body = (tableLabel || msg || '손님') + (type === 'booking' ? ' — 부킹 요청' : ' — 호출');
  const emojiIcon = emojiToPng(type === 'call' ? '🙋' : '🔔');
  const options = {
    body,
    icon: emojiIcon,
    badge: emojiIcon,
    vibrate: type === 'booking' ? [200, 100, 200, 100, 400] : [150, 80, 150],
    tag: type + '-' + Date.now(),
    renotify: true,
    requireInteraction: false
  };
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.ready;
      await reg.showNotification(title, options);
      return;
    } catch (e) {}
  }
  try { new Notification(title, options); } catch(e) {}
}
function vibrate(type) {
  if (!navigator.vibrate) return;
  navigator.vibrate(type==='booking' ? [200,100,200,100,400] : [150,80,150]);
}
let audioCtx;
function playBeep(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type==='booking') {
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.setValueAtTime(660, audioCtx.currentTime+0.15);
      osc.frequency.setValueAtTime(880, audioCtx.currentTime+0.3);
      gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.6);
      osc.start(); osc.stop(audioCtx.currentTime+0.6);
    } else {
      osc.frequency.setValueAtTime(660, audioCtx.currentTime);
      osc.frequency.setValueAtTime(880, audioCtx.currentTime+0.12);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.35);
      osc.start(); osc.stop(audioCtx.currentTime+0.35);
    }
  } catch(e) {}
}

// 통합 알림 함수 - 앱/웹 중 현재 활성화된 것에서만 울림
function notify(type, tableLabel, guestMsg, extra) {
  vibrate(type);
  playBeep(type);
  showPush(type, guestMsg, tableLabel);
  showInAppBanner(type, tableLabel, guestMsg, extra);
}

let inAppBannerTimer;
function showInAppBanner(type, tableLabel, guestMsg, extra) {
  const banner = document.getElementById('inAppBanner');
  banner.className = 'show iab-' + type;
  document.getElementById('iabIcon').textContent = type === 'call' ? '🙋' : type === 'beer' ? '🍾' : type === 'message' ? '💬' : '🔔';
  document.getElementById('iabTitle').textContent = type === 'call' ? '웨이터 호출' : type === 'beer' ? '맥주 추가' : type === 'message' ? '메시지' : '부킹 요청';
  document.getElementById('iabSub').textContent = type === 'message' && extra ? (tableLabel || guestMsg) + ' — ' + extra : (tableLabel || guestMsg || '손님');
  clearTimeout(inAppBannerTimer);
  inAppBannerTimer = setTimeout(hideInAppBanner, 5000);
}
function hideInAppBanner() {
  const banner = document.getElementById('inAppBanner');
  banner.className = '';
  banner.style.display = 'none';
  setTimeout(() => { banner.style.display = ''; }, 50);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2000);
}

// PWA
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });
}

// 자동 로그인 실행
function tryAutoLogin() {
  if (window._fbReady) {
    autoLogin();
  } else {
    document.addEventListener('fb-ready', () => autoLogin(), {once:true});
  }
}
// DOM 로드 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', tryAutoLogin);
} else {
  tryAutoLogin();
}
</script>
